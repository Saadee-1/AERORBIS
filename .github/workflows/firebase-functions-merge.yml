# Deploy Firebase Cloud Functions on merge to main.
# Uses a service account JSON stored in GitHub Secrets.

name: Deploy to Firebase Functions on merge

on:
  push:
    branches:
      - main
    paths:
      - "functions/**"
      - "firebase.json"
  workflow_dispatch:

jobs:
  deploy_functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "functions/package.json"

      - name: Install dependencies (functions)
        working-directory: functions
        run: npm ci || npm i

      - name: Authenticate to Google Cloud (service account)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AERORBIS_DAD0A }}

      - name: Install Firebase CLI
        run: npm i -g firebase-tools

      - name: Deploy functions
        run: firebase deploy --only functions --project aerorbis-dad0a
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
