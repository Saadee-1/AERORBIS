name: Auto-Update README

on:
  push:
    branches: 
      - main
    paths:
      - 'src/**'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name:  Generate updated README content
        id: readme_content
        run: |
          # Generate timestamp
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          
          # Count source files
          SRC_FILES=$(find src -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" \) 2>/dev/null | wc -l)
          
          # Get last commit info
          LAST_COMMIT=$(git log -1 --pretty=format:"%h - %s")
          
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "src_files=$SRC_FILES" >> $GITHUB_OUTPUT
          echo "last_commit=$LAST_COMMIT" >> $GITHUB_OUTPUT
      
      - name: Update README
        run: |
          # Create temporary file with main content
          if grep -q "<!-- AUTO-GENERATED SECTION -->" README.md; then
            head -n $(grep -n "<!-- AUTO-GENERATED SECTION -->" README.md | head -1 | cut -d:  -f1) README.md | head -n -1 > README_temp.md
          else
            cp README.md README_temp.md
          fi
          
          # Append updated statistics section
          cat >> README_temp.md << 'EOF'

---

## 📊 Repository Statistics

<!-- AUTO-GENERATED SECTION -->

| Metric | Value |
|--------|-------|
| Last Updated | ${{ steps.readme_content.outputs.timestamp }} |
| Source Files | ${{ steps.readme_content.outputs.src_files }} |
| Latest Commit | ${{ steps.readme_content.outputs.last_commit }} |

*This README is automatically updated whenever changes are made to the `src/` directory.*

<!-- END AUTO-GENERATED SECTION -->
EOF
          
          mv README_temp.md README.md
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      
      - name:  Check for changes
        id: check_changes
        run: |
          if git diff --quiet README.md; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      
      - name:  Commit and push
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git add README.md
          git commit -m "docs:  auto-update README with latest repository statistics [skip ci]"
          git push
